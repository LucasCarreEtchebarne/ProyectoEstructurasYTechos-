<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<body>


<section th:fragment="formCliente">

    <div class="card mb-4 shadow">
        <div class="card-header bg-primary text-white">
            Registrar Cliente
        </div>

        <div class="card-body">

            <form th:action="@{/clientes/guardar}" 
                  th:object="${cliente}" 
                  method="post">

                <input type="hidden" th:field="*{idCliente}">

                <div class="row">

                    <div class="col-md-4">
                        <label class="form-label">Nombre</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{nombre}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Teléfono</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{telefono}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Correo</label>
                        <input type="email"
                               class="form-control"
                               th:field="*{correo}">
                    </div>

                </div>

                <div class="row mt-3">

                    <div class="col-md-8">
                        <label class="form-label">Dirección</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{direccion}">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Activo</label>
                        <select class="form-control"
                                th:field="*{activo}">
                            <option th:value="true">Sí</option>
                            <option th:value="false">No</option>
                        </select>
                    </div>

                </div>

                <button type="submit" 
                        class="btn btn-success mt-3">
                    Guardar Cliente
                </button>

            </form>

        </div>
    </div>

</section>


<section th:fragment="tablaClientes">

    <div class="table-responsive">

        <table class="table table-striped table-hover">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Correo</th>
                    <th>Dirección</th>
                    <th>Activo</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="c : ${clientes}">

                    <td th:text="${c.idCliente}"></td>
                    <td th:text="${c.nombre}"></td>
                    <td th:text="${c.telefono}"></td>
                    <td th:text="${c.correo}"></td>
                    <td th:text="${c.direccion}"></td>
                    <td th:text="${c.activo}"></td>

                    <td>

                        <a th:href="@{/clientes/modificar/{id}(id=${c.idCliente})}"
                           class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <form th:action="@{/clientes/eliminar}" 
                              method="post"
                              style="display:inline">

                            <input type="hidden"
                                   name="idCliente"
                                   th:value="${c.idCliente}">

                            <button class="btn btn-danger btn-sm">
                                Eliminar
                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</section>

</body>
</html>
