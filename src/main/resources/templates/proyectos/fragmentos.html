<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <body>

        <section th:fragment="formProyecto">

            <div class="card mb-4 shadow">
                <div class="card-header bg-primary text-white">
                    Registrar Proyecto
                </div>

                <div class="card-body">

                    <form th:action="@{/proyectos/guardar}"
                          th:object="${proyecto}"
                          method="post">

                        <input type="hidden" th:field="*{idProyecto}">

                            <div class="row">

                                <div class="col-md-6">
                                    <label class="form-label">Nombre del Proyecto</label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{nombreProyecto}"
                                           required>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Ubicación</label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{ubicacion}">
                                </div>

                            </div>

                            <div class="row mt-3">

                                <div class="col-md-8">
                                    <label class="form-label">Descripción</label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{descripcion}">
                                </div>

                                <div class="col-md-2">
                                    <label class="form-label">Estado</label>
                                    <select class="form-control"
                                            th:field="*{estado}">
                                        <option value="Pendiente">Pendiente</option>
                                        <option value="En proceso">En proceso</option>
                                        <option value="Finalizado">Finalizado</option>
                                    </select>
                                </div>

                                <div class="col-md-2">
                                    <label class="form-label">Cliente</label>
                                    <select class="form-control" name="idCliente" required>
                                        <option value="">Seleccione</option>
                                        <option th:each="c : ${clientes}"
                                                th:value="${c.idCliente}"
                                                th:text="${c.nombre}">
                                        </option>
                                    </select>
                                </div>

                            </div>

                            <button type="submit"
                                    class="btn btn-success mt-3">
                                Guardar Proyecto
                            </button>

                    </form>

                </div>
            </div>

        </section>


        <section th:fragment="tablaProyectos">

            <div class="table-responsive">

                <table class="table table-striped table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Ubicación</th>
                            <th>Estado</th>
                            <th>Cliente</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody>

                        <tr th:each="p : ${proyectos}">
                            <td th:text="${p.idProyecto}"></td>
                            <td th:text="${p.nombreProyecto}"></td>
                            <td th:text="${p.descripcion}"></td>
                            <td th:text="${p.ubicacion}"></td>
                            <td th:text="${p.estado}"></td>
                            <td th:text="${p.cliente != null ? p.cliente.nombre : 'Sin cliente'}"></td>

                            <td>
                                <a th:href="@{/proyectos/modificar/{idProyecto}(idProyecto=${p.idProyecto})}"
                                   class="btn btn-warning btn-sm">
                                    Editar
                                </a>

                                <form th:action="@{/proyectos/eliminar}"
                                      method="post"
                                      style="display:inline">

                                    <input type="hidden"
                                           name="idProyecto"
                                           th:value="${p.idProyecto}">

                                        <button type="submit"
                                                class="btn btn-danger btn-sm">
                                            Eliminar
                                        </button>

                                </form>
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </section>

    </body>
</html>
