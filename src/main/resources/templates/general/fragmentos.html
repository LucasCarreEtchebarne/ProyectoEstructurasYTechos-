<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <head th:fragment="head">
        <title>Techos Y Estructuras</title>
        <meta charset="UTF-8">
            <link rel="stylesheet" th:href="@{/static.css/estilos.css}">
                <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
                <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>
                <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
                <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
                <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
                <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
                <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
                        </head>
                        <body>

                            <header th:fragment="header" class="header">
                                <nav class="navbar navbar-expand-sm p-0">
                                    <div class = "container">
                                        <a th:href="@{/}" class="navbar-brand">[[#{aplicacion.titulo}]]</a>
                                        <form th:action="@{/logout}" method="POST">
                                            <button type="submit" class="btn btn-danger">[[#{accion.cerrar.sesion}]]</button>
                                        </form>
                                    </div>
                                </nav>
                            </header>

                            <section>
                                <div class="row text-center mt-5">
                                    <div class="col-md-4">
                                        <div class="card p-4">
                                            <i class="bi bi-person display-1"></i>
                                            <h3>[[#{plantilla.clientes}]]</h3>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="card p-4">
                                            <i class="bi bi-folder display-1"></i>
                                            <h3>[[#{plantilla.proyectos}]]</h3>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="card p-4">
                                            <i class="bi bi-envelope display-1"></i>
                                            <h3>[[#{plantilla.cotizaciones}]]</h3>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <footer th:fragment="footer" class="p-2 mt-5 bg-info text-white">
                                <p class="lead text-center">[[#{plantilla.derechos}]] &COPY;</p>
                            </footer>

                        </body>
                        </html>
