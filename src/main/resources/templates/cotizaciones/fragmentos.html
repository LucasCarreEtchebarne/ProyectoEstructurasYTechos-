<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<body>

    <section th:fragment="formCotizacion">

        <div class="card mb-4 shadow">

            <div class="card-header bg-primary text-white">
                Registrar Cotización
            </div>

            <div class="card-body">

                <form th:action="@{/cotizaciones/guardar}"
                      th:object="${cotizacion}"
                      method="post">

                    <input type="hidden" th:field="*{idCotizacion}">

                    <div class="row">

                        <div class="col-md-6">
                            <label class="form-label">Descripción</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{descripcion}">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Monto Total</label>
                            <input type="number"
                                   step="0.01"
                                   class="form-control"
                                   th:field="*{montoTotal}">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Estado</label>
                            <select class="form-control"
                                    th:field="*{estado}">
                                <option value="Pendiente">Pendiente</option>
                                <option value="Aprobada">Aprobada</option>
                                <option value="Rechazada">Rechazada</option>
                            </select>
                        </div>

                    </div>

                    <div class="row mt-3">

                        <div class="col-md-6">
                            <label class="form-label">Cliente</label>

                            <select class="form-control"
                                    th:field="*{cliente}">

                                <option th:each="c : ${clientes}"
                                        th:value="${c}"
                                        th:text="${c.nombre}">
                                </option>

                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Proyecto</label>

                            <select class="form-control"
                                    th:field="*{proyecto}">

                                <option th:each="p : ${proyectos}"
                                        th:value="${p}"
                                        th:text="${p.nombreProyecto}">
                                </option>

                            </select>
                        </div>

                    </div>

                    <button type="submit"
                            class="btn btn-success mt-3">
                        Guardar Cotización
                    </button>

                </form>

            </div>

        </div>

    </section>


    <section th:fragment="tablaCotizaciones">

        <div class="table-responsive">

            <table class="table table-striped table-hover">

                <thead class="table-dark">

                    <tr>
                        <th>ID</th>
                        <th>Descripción</th>
                        <th>Monto</th>
                        <th>Estado</th>
                        <th>Cliente</th>
                        <th>Proyecto</th>
                        <th>Acciones</th>
                    </tr>

                </thead>

                <tbody>

                    <tr th:each="c : ${cotizaciones}">

                        <td th:text="${c.idCotizacion}"></td>

                        <td th:text="${c.descripcion}"></td>

                        <td th:text="${c.montoTotal}"></td>

                        <td th:text="${c.estado}"></td>

                        <td th:text="${c.cliente.nombre}"></td>

                        <td th:text="${c.proyecto.nombreProyecto}"></td>

                        <td>

                            <a th:href="@{/cotizaciones/modificar/{id}(id=${c.idCotizacion})}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <form th:action="@{/cotizaciones/eliminar}"
                                  method="post"
                                  style="display:inline">

                                <input type="hidden"
                                       name="idCotizacion"
                                       th:value="${c.idCotizacion}">

                                <button class="btn btn-danger btn-sm">
                                    Eliminar
                                </button>

                            </form>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </section>

</body>
</html>
